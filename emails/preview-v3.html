<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>FrankX Email v3.0 Preview</title>
<style>
  body { margin: 0; background: #0a0a0f; font-family: system-ui; }
  .preview-nav { position: sticky; top: 0; z-index: 10; background: #141420; border-bottom: 1px solid rgba(100,116,139,0.15); padding: 16px 24px; display: flex; gap: 12px; flex-wrap: wrap; }
  .preview-nav button { background: rgba(139,92,246,0.12); color: #a78bfa; border: 1px solid rgba(139,92,246,0.2); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
  .preview-nav button:hover, .preview-nav button.active { background: #8B5CF6; color: white; }
  .preview-nav h2 { color: #F1F5F9; font-size: 16px; margin: 0; display: flex; align-items: center; gap: 8px; width: 100%; margin-bottom: 8px; }
  .preview-nav h2 span { background: linear-gradient(135deg, #06b6d4 0%, #8B5CF6 50%, #9333ea 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .frame-wrap { max-width: 660px; margin: 32px auto; }
  iframe { width: 100%; height: 900px; border: 1px solid rgba(100,116,139,0.12); border-radius: 16px; background: #0a0a0f; }
  .device-toggle { display: flex; gap: 8px; margin-left: auto; }
  .device-toggle button { background: rgba(34,211,238,0.08); color: #22d3ee; border: 1px solid rgba(34,211,238,0.15); font-size: 12px; }
</style>
</head>
<body>

<div class="preview-nav">
  <h2><span>FrankX.AI</span> Email Design System v3.0</h2>
  <button class="active" onclick="show('welcome')">Welcome</button>
  <button onclick="show('pdf')">PDF Delivery</button>
  <button onclick="show('music')">Music Prompts</button>
  <button onclick="show('purchase')">Purchase</button>
  <button onclick="show('album')">Album Release</button>
  <button onclick="show('broadcast')">Broadcast</button>
  <button onclick="show('test')">Test</button>
  <div class="device-toggle">
    <button onclick="setWidth(375)">Mobile</button>
    <button onclick="setWidth(600)">Desktop</button>
  </div>
</div>

<div class="frame-wrap">
  <iframe id="preview" srcdoc="Loading..."></iframe>
</div>

<script>
// Inline the templates so the preview works standalone
const TEMPLATES = {};

// We'll load them from the API
async function loadTemplates() {
  try {
    // Try loading from local dev server
    const resp = await fetch('/api/test-email?format=preview');
    if (resp.ok) return await resp.json();
  } catch(e) {}
  // Fallback: show placeholder
  return null;
}

function show(name) {
  document.querySelectorAll('.preview-nav button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  const iframe = document.getElementById('preview');
  const url = `/api/test-email`;

  // Use srcdoc approach for local testing
  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      recipientEmail: 'preview@test.com',
      recipientName: 'Preview User',
      templateType: name === 'welcome' ? 'welcome' : 'test',
      renderOnly: true
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data.html) iframe.srcdoc = data.html;
    else iframe.srcdoc = `<body style="background:#0a0a0f;color:white;font-family:system-ui;padding:40px;text-align:center;"><h2>Template: ${name}</h2><p style="color:#94a3b8;">Start the dev server to preview live templates.<br><code>cd frankx.ai-vercel-website && pnpm dev</code></p></body>`;
  })
  .catch(() => {
    iframe.srcdoc = `<body style="background:#0a0a0f;color:white;font-family:system-ui;padding:40px;text-align:center;"><h2>Template: ${name}</h2><p style="color:#94a3b8;">Start the dev server to preview live templates.<br><code>cd frankx.ai-vercel-website && pnpm dev</code></p></body>`;
  });
}

function setWidth(w) {
  document.getElementById('preview').style.width = w + 'px';
}

// Initial load
show('welcome');
</script>

</body>
</html>
