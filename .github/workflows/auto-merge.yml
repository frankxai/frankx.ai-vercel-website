name: Auto-Merge on Approval

# Enables auto-merge when a PR has:
# 1. All CI checks passing (typecheck, lint, build)
# 2. At least 1 approving review (from frankxai or AI council)
# 3. No changes requested

on:
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved'
    steps:
      - name: Enable auto-merge
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash

  # When all checks pass on a PR that's already approved, merge it
  merge-on-green:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'check_suite' &&
      github.event.check_suite.conclusion == 'success' &&
      github.event.check_suite.pull_requests[0]
    steps:
      - name: Check for approval and auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.check_suite.pull_requests[0].number }}

          # Check if PR has an approving review
          APPROVED=$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews \
            --jq '[.[] | select(.state == "APPROVED")] | length')

          if [ "$APPROVED" -gt "0" ]; then
            echo "PR #${PR_NUMBER} is approved and checks pass. Enabling auto-merge..."
            gh pr merge ${PR_NUMBER} --repo ${{ github.repository }} --squash --auto
          else
            echo "PR #${PR_NUMBER} checks pass but no approval yet. Skipping."
          fi
