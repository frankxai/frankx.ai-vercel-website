name: Label AI-Reviewed PRs

# Adds labels when AI reviewers complete their reviews
# Helps track which PRs have been reviewed by the council

on:
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  issues: write

jobs:
  label-ai-reviews:
    runs-on: ubuntu-latest
    if: >
      contains(fromJson('["coderabbitai[bot]","gemini-code-assist[bot]","cursor[bot]","chatgpt-codex-connector[bot]"]'),
      github.event.sender.login)
    steps:
      - name: Add AI-reviewed label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request_review" ]; then
            PR_NUMBER=${{ github.event.pull_request.number }}
          else
            # Extract PR number from issue (issue_comment on PRs)
            PR_NUMBER=${{ github.event.issue.number }}
          fi

          REVIEWER="${{ github.event.sender.login }}"

          case "$REVIEWER" in
            "coderabbitai[bot]") LABEL="reviewed:coderabbit" ;;
            "gemini-code-assist[bot]") LABEL="reviewed:gemini" ;;
            "cursor[bot]") LABEL="reviewed:cursor" ;;
            "chatgpt-codex-connector[bot]") LABEL="reviewed:codex" ;;
            *) LABEL="reviewed:ai" ;;
          esac

          # Create label if it doesn't exist (ignore errors)
          gh label create "$LABEL" --repo ${{ github.repository }} \
            --color "0e8a16" --description "Reviewed by ${REVIEWER}" 2>/dev/null || true

          gh pr edit ${PR_NUMBER} --repo ${{ github.repository }} --add-label "$LABEL"
          echo "Added label $LABEL to PR #${PR_NUMBER}"
