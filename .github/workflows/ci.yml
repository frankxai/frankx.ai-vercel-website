name: CI

on:
  push:
    branches: [main, staging]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'data/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.*'
      - 'tsconfig*.json'
      - '.eslintrc*'
      - 'eslint.config.*'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, staging]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'data/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.*'
      - 'tsconfig*.json'
      - '.eslintrc*'
      - 'eslint.config.*'
      - '.github/workflows/ci.yml'

# Cancel superseded runs on rapid pushes to the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Type Check
        run: pnpm run type-check

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
