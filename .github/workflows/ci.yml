name: CI

on:
  push:
    branches: [main, staging]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'data/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.*'
      - 'tsconfig*.json'
      - '.eslintrc*'
      - 'eslint.config.*'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, staging]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'data/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.*'
      - 'tsconfig*.json'
      - '.eslintrc*'
      - 'eslint.config.*'
      - '.github/workflows/ci.yml'

# Cancel superseded runs on rapid pushes to the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - name: Type Check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
