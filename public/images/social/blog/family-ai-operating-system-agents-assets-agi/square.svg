<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-labelledby="title desc">
  <title id="title">Family AI Operating System square social card</title>
  <desc id="desc">Square FrankX social card for the Family AI Operating System article.</desc>
  <defs>
    <radialGradient id="glow" cx="54%" cy="42%" r="76%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.26"/>
      <stop offset="55%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0a0b" stop-opacity="0"/>
    </radialGradient>
    <style>
      .bg { fill: #0a0a0b; }
      .grid { stroke: #ffffff; stroke-opacity: 0.045; stroke-width: 1; }
      .eyebrow { fill: #6ee7b7; font: 700 20px "JetBrains Mono", Consolas, monospace; letter-spacing: 3px; }
      .title { fill: #f8fafc; font: 800 76px Poppins, Inter, Arial, sans-serif; }
      .deck { fill: #cbd5e1; font: 500 28px Inter, Arial, sans-serif; }
      .tiny { fill: #94a3b8; font: 600 22px Inter, Arial, sans-serif; }
      .panel { fill: #111827; stroke: #ffffff; stroke-opacity: 0.12; stroke-width: 1.3; }
    </style>
  </defs>
  <rect class="bg" width="1080" height="1080"/>
  <rect width="1080" height="1080" fill="url(#glow)"/>
  <path class="grid" d="M100 0v1080M260 0v1080M420 0v1080M580 0v1080M740 0v1080M900 0v1080"/>
  <path class="grid" d="M0 120h1080M0 300h1080M0 480h1080M0 660h1080M0 840h1080M0 1020h1080"/>
  <text class="eyebrow" x="82" y="120">FRANKX FIELD GUIDE</text>
  <text class="title" x="82" y="236">Family AI</text>
  <text class="title" x="82" y="326">Operating</text>
  <text class="title" x="82" y="416">System</text>
  <text class="deck" x="84" y="486">Agents. Assets. Safety. Culture.</text>
  <g transform="translate(170 586)">
    <rect class="panel" width="740" height="246" rx="34"/>
    <text class="tiny" x="46" y="68">Learn -> build -> verify -> protect</text>
    <text class="tiny" x="46" y="118">Teach the next generation.</text>
    <text class="tiny" x="46" y="168">Use AI without giving up judgment.</text>
  </g>
  <text class="tiny" x="82" y="950">frankx.ai</text>
</svg>
