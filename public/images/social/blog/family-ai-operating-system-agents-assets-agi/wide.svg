<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Family AI Operating System social card</title>
  <desc id="desc">Wide FrankX social card for the Family AI Operating System article.</desc>
  <defs>
    <radialGradient id="glow" cx="64%" cy="46%" r="70%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.26"/>
      <stop offset="50%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0a0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="60%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <style>
      .bg { fill: #0a0a0b; }
      .grid { stroke: #ffffff; stroke-opacity: 0.045; stroke-width: 1; }
      .eyebrow { fill: #6ee7b7; font: 700 24px "JetBrains Mono", Consolas, monospace; letter-spacing: 3px; }
      .title { fill: #f8fafc; font: 800 86px Poppins, Inter, Arial, sans-serif; }
      .deck { fill: #cbd5e1; font: 500 34px Inter, Arial, sans-serif; }
      .tiny { fill: #94a3b8; font: 600 24px Inter, Arial, sans-serif; }
      .panel { fill: #111827; stroke: #ffffff; stroke-opacity: 0.12; stroke-width: 1.3; }
      .signal { stroke: url(#line); stroke-width: 5; fill: none; stroke-linecap: round; }
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <path class="grid" d="M120 0v900M320 0v900M520 0v900M720 0v900M920 0v900M1120 0v900M1320 0v900M1520 0v900"/>
  <path class="grid" d="M0 120h1600M0 300h1600M0 480h1600M0 660h1600M0 840h1600"/>
  <g transform="translate(118 150)">
    <text class="eyebrow" x="0" y="0">FRANKX FIELD GUIDE</text>
    <text class="title" x="0" y="126">Family AI</text>
    <text class="title" x="0" y="224">Operating System</text>
    <text class="deck" x="0" y="300">Agents. Assets. Safety. Culture.</text>
    <text class="tiny" x="0" y="384">For founders, family stewards, builders, and the next generation.</text>
  </g>
