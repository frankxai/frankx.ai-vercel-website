<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Claude Fable 5 analysis — benchmarks, evals, and routing guidance">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="980" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0a0b" />
      <stop offset="0.55" stop-color="#0d1410" />
      <stop offset="1" stop-color="#0a0a0b" />
    </linearGradient>
    <radialGradient id="pulse" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 420) rotate(90) scale(620 560)">
      <stop offset="0" stop-color="#10b981" stop-opacity="0.30" />
      <stop offset="1" stop-color="#10b981" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#059669" />
      <stop offset="1" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="barDim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f2937" />
      <stop offset="1" stop-color="#374151" />
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <rect width="1600" height="900" fill="url(#pulse)" />

  <!-- grid whisper -->
  <g stroke="#ffffff" stroke-opacity="0.04">
    <line x1="0" y1="225" x2="1600" y2="225" />
    <line x1="0" y1="450" x2="1600" y2="450" />
    <line x1="0" y1="675" x2="1600" y2="675" />
    <line x1="400" y1="0" x2="400" y2="900" />
    <line x1="800" y1="0" x2="800" y2="900" />
    <line x1="1200" y1="0" x2="1200" y2="900" />
  </g>

  <!-- eyebrow -->
  <text x="120" y="200" font-family="Inter, -apple-system, sans-serif" font-size="22" letter-spacing="8" fill="#34d399" opacity="0.85">MODEL ANALYSIS · JUNE 2026</text>

  <!-- title -->
  <text x="120" y="320" font-family="Poppins, Inter, sans-serif" font-size="104" font-weight="600" fill="#ffffff" letter-spacing="-2">Claude Fable 5</text>
  <text x="120" y="396" font-family="Inter, sans-serif" font-size="34" fill="#a9a9aa">Mythos-class, generally available — measured, not marketed</text>

  <!-- benchmark bars motif (SWE-bench Pro, launch-window figures) -->
  <g font-family="Inter, sans-serif" font-size="24">
    <text x="120" y="540" fill="#ffffff">Fable 5</text>
    <rect x="320" y="516" width="880" height="34" rx="6" fill="url(#bar)" />
    <text x="1220" y="540" fill="#34d399" font-weight="600">80%</text>

    <text x="120" y="616" fill="#a9a9aa">GPT-5.5</text>
    <rect x="320" y="592" width="645" height="34" rx="6" fill="url(#barDim)" />
    <text x="985" y="616" fill="#787878">58.6%</text>

    <text x="120" y="692" fill="#a9a9aa">Gemini 3.1 Pro</text>
    <rect x="320" y="668" width="596" height="34" rx="6" fill="url(#barDim)" />
    <text x="936" y="692" fill="#787878">54.2%</text>
  </g>
  <text x="120" y="760" font-family="Inter, sans-serif" font-size="19" fill="#535354">SWE-bench Pro, launch-window figures — vendor-claimed, marked as such inside</text>

  <!-- footer -->
  <text x="120" y="830" font-family="Inter, sans-serif" font-size="22" letter-spacing="3" fill="#787878">FRANKX.AI · 4 FIRST-PARTY EVAL ROUNDS · RECEIPTS PUBLISHED</text>
</svg>
