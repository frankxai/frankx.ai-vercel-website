<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="820" viewBox="0 0 1500 820" role="img" aria-labelledby="title desc">
  <title id="title">Starlight arena receipts timeline</title>
  <desc id="desc">Timeline of the Starlight model arena receipts from June 9 to June 12 2026.</desc>
  <rect width="1500" height="820" fill="#09090B"/>
  <text x="80" y="90" fill="#F3D27A" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">Receipts beat leaderboard takes.</text>
  <text x="80" y="128" fill="#fff" fill-opacity="0.62" font-family="Inter, Arial, sans-serif" font-size="20">The arena is useful because each claim points to a JSON file.</text>
  <path d="M150 410h1200" stroke="#fff" stroke-opacity="0.16" stroke-width="3"/>
  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(130 245)">
      <circle cx="70" cy="165" r="11" fill="#F3D27A"/>
      <rect width="260" height="132" rx="18" fill="#fff" fill-opacity="0.045" stroke="#F3D27A" stroke-opacity="0.32"/>
      <text x="24" y="42" fill="#F8E6B0" font-size="18" font-weight="700">Jun 9 / Baseline</text>
      <text x="24" y="76" fill="#fff" fill-opacity="0.74" font-size="15">Fable vs Opus</text>
      <text x="24" y="104" fill="#fff" fill-opacity="0.46" font-size="13">format discipline signal</text>
    </g>
    <g transform="translate(375 443)">
      <circle cx="70" cy="-33" r="11" fill="#A78BFA"/>
      <rect width="260" height="132" rx="18" fill="#fff" fill-opacity="0.045" stroke="#A78BFA" stroke-opacity="0.32"/>
      <text x="24" y="42" fill="#C4B5FD" font-size="18" font-weight="700">Jun 9 / Stress</text>
      <text x="24" y="76" fill="#fff" fill-opacity="0.74" font-size="15">constraints vs judgment</text>
      <text x="24" y="104" fill="#fff" fill-opacity="0.46" font-size="13">governance gate appears</text>
    </g>
    <g transform="translate(620 245)">
      <circle cx="70" cy="165" r="11" fill="#34D399"/>
      <rect width="260" height="132" rx="18" fill="#fff" fill-opacity="0.045" stroke="#34D399" stroke-opacity="0.32"/>
      <text x="24" y="42" fill="#6EE7B7" font-size="18" font-weight="700">Jun 9 / Hard</text>
      <text x="24" y="76" fill="#fff" fill-opacity="0.74" font-size="15">no-tools reasoning</text>
      <text x="24" y="104" fill="#fff" fill-opacity="0.46" font-size="13">Fable takes the card</text>
    </g>
    <g transform="translate(865 443)">
      <circle cx="70" cy="-33" r="11" fill="#67E8F9"/>
      <rect width="260" height="132" rx="18" fill="#fff" fill-opacity="0.045" stroke="#67E8F9" stroke-opacity="0.32"/>
      <text x="24" y="42" fill="#A5F3FC" font-size="18" font-weight="700">Jun 10 / Lineup</text>
      <text x="24" y="76" fill="#fff" fill-opacity="0.74" font-size="15">Fable / Opus / Sonnet / Haiku</text>
      <text x="24" y="104" fill="#fff" fill-opacity="0.46" font-size="13">capability saturation</text>
    </g>
    <g transform="translate(1110 245)">
      <circle cx="70" cy="165" r="11" fill="#FB923C"/>
      <rect width="260" height="132" rx="18" fill="#fff" fill-opacity="0.045" stroke="#FB923C" stroke-opacity="0.32"/>
      <text x="24" y="42" fill="#FDBA74" font-size="18" font-weight="700">Jun 12 / Grok lane</text>
      <text x="24" y="76" fill="#fff" fill-opacity="0.74" font-size="15">Composer-style workflow</text>
      <text x="24" y="104" fill="#fff" fill-opacity="0.46" font-size="13">directional, not settled</text>
    </g>
  </g>
