<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">Family AI Operating System Map</title>
  <desc id="desc">A FrankX infographic mapping four audiences around a shared learning, work, asset, safety, community, and memory operating system.</desc>
  <defs>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="55%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0a0a0b" stop-opacity="0"/>
    </radialGradient>
    <style>
      .bg { fill: #0a0a0b; }
      .panel { fill: #111827; stroke: #ffffff; stroke-opacity: 0.12; stroke-width: 1.2; }
      .node { fill: #0f1f1a; stroke: #10b981; stroke-opacity: 0.55; stroke-width: 1.5; }
      .edge { stroke: url(#line); stroke-width: 3; stroke-linecap: round; fill: none; opacity: 0.85; }
      .grid { stroke: #ffffff; stroke-opacity: 0.05; stroke-width: 1; }
      .eyebrow { fill: #6ee7b7; font: 700 16px "JetBrains Mono", Consolas, monospace; letter-spacing: 2px; }
      .title { fill: #f8fafc; font: 700 50px Poppins, Inter, Arial, sans-serif; }
      .deck { fill: #cbd5e1; font: 400 22px Inter, Arial, sans-serif; }
      .h { fill: #f8fafc; font: 700 25px Inter, Arial, sans-serif; }
      .body { fill: #94a3b8; font: 500 17px Inter, Arial, sans-serif; }
      .tiny { fill: #64748b; font: 600 13px "JetBrains Mono", Consolas, monospace; letter-spacing: 1px; }
    </style>
  </defs>
  <rect class="bg" width="1400" height="980"/>
  <rect width="1400" height="980" fill="url(#glow)"/>
  <path class="grid" d="M100 0v980M260 0v980M420 0v980M580 0v980M740 0v980M900 0v980M1060 0v980M1220 0v980"/>
  <path class="grid" d="M0 120h1400M0 260h1400M0 400h1400M0 540h1400M0 680h1400M0 820h1400"/>

  <text class="eyebrow" x="90" y="82">INFOGENIUS GRAPHIC 01</text>
  <text class="title" x="90" y="145">Family AI Operating System</text>
  <text class="deck" x="92" y="190">One shared culture for stewards, operators, builders, and the next generation.</text>

  <g transform="translate(442 308)">
    <circle class="node" cx="258" cy="196" r="132"/>
    <circle cx="258" cy="196" r="82" fill="#111827" stroke="#06b6d4" stroke-opacity="0.5" stroke-width="2"/>
    <text class="h" x="196" y="180">Shared</text>
    <text class="h" x="183" y="211">AI Culture</text>
    <text class="body" x="174" y="244">rules + memory + review</text>
  </g>

  <path class="edge" d="M700 372 C604 282 480 242 340 252"/>
  <path class="edge" d="M700 372 C818 277 946 238 1086 252"/>
  <path class="edge" d="M700 635 C575 728 456 763 330 744"/>
  <path class="edge" d="M700 635 C825 728 944 763 1070 744"/>

  <g transform="translate(92 238)">
    <rect class="panel" width="332" height="168" rx="24"/>
    <text class="tiny" x="28" y="38">AUDIENCE</text>
    <text class="h" x="28" y="76">Family Steward</text>
    <text class="body" x="28" y="110">Defines privacy, child safety,</text>
    <text class="body" x="28" y="136">learning rules, and boundaries.</text>
  </g>
  <g transform="translate(976 238)">
    <rect class="panel" width="332" height="168" rx="24"/>
    <text class="tiny" x="28" y="38">AUDIENCE</text>
    <text class="h" x="28" y="76">CEO Operator</text>
    <text class="body" x="28" y="110">Maps sales, logistics, rentals,</text>
    <text class="body" x="28" y="136">documents, and repeat work.</text>
  </g>
  <g transform="translate(92 692)">
    <rect class="panel" width="332" height="168" rx="24"/>
    <text class="tiny" x="28" y="38">AUDIENCE</text>
    <text class="h" x="28" y="76">Builder</text>
    <text class="body" x="28" y="110">Turns chats into repos, tests,</text>
    <text class="body" x="28" y="136">assets, and documented systems.</text>
  </g>
  <g transform="translate(976 692)">
    <rect class="panel" width="332" height="168" rx="24"/>
    <text class="tiny" x="28" y="38">AUDIENCE</text>
    <text class="h" x="28" y="76">Next Generation</text>
    <text class="body" x="28" y="110">Learns sources, judgment, taste,</text>
    <text class="body" x="28" y="136">ethics, and real capability.</text>
  </g>

  <g transform="translate(266 502)">
    <rect class="panel" width="172" height="86" rx="18"/>
    <text class="h" x="28" y="36">Learn</text>
    <text class="body" x="28" y="62">weekly labs</text>
  </g>
  <g transform="translate(484 754)">
    <rect class="panel" width="172" height="86" rx="18"/>
    <text class="h" x="28" y="36">Build</text>
    <text class="body" x="28" y="62">assets</text>
  </g>
  <g transform="translate(746 754)">
    <rect class="panel" width="172" height="86" rx="18"/>
    <text class="h" x="28" y="36">Verify</text>
    <text class="body" x="28" y="62">sources</text>
  </g>
  <g transform="translate(962 502)">
    <rect class="panel" width="172" height="86" rx="18"/>
    <text class="h" x="28" y="36">Protect</text>
    <text class="body" x="28" y="62">people + keys</text>
  </g>
</svg>
