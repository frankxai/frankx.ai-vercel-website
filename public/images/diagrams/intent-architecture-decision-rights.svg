<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">Decision-rights ladder for AI agents</title>
  <desc id="desc">Five levels of agent authority from draft through orchestrate, paired with increasing governance requirements.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0a0a0b"/><stop offset="1" stop-color="#0d1618"/></linearGradient>
    <linearGradient id="authority" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#748084"/><stop offset=".5" stop-color="#06b6d4"/><stop offset="1" stop-color="#10b981"/></linearGradient>
  </defs>
  <rect width="1600" height="920" rx="36" fill="url(#bg)"/>
  <text x="120" y="105" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="750">Decision rights, not autonomy theatre</text>
  <text x="120" y="150" fill="#849195" font-family="Inter, Arial, sans-serif" font-size="21">More authority is justified only when reversibility, verification, and policy improve with it.</text>

  <g font-family="Inter, Arial, sans-serif">
    <path d="M150 735 H1450" stroke="url(#authority)" stroke-width="8" stroke-linecap="round"/>
    <text x="150" y="785" fill="#7e8a8d" font-size="17">LOWER AUTHORITY</text>
    <text x="1450" y="785" text-anchor="end" fill="#6ee7b7" font-size="17">HIGHER AUTHORITY</text>
    <text x="800" y="840" text-anchor="middle" fill="#9aa5a7" font-size="18">Governance load rises with consequence, irreversibility, uncertainty, and delegation depth.</text>

    <g transform="translate(120 235)">
      <rect width="250" height="410" rx="26" fill="#121416" stroke="#4b5558" stroke-width="2"/>
      <text x="28" y="55" fill="#8c989b" font-size="18" font-weight="700">D0</text>
      <text x="28" y="92" fill="#ffffff" font-size="28" font-weight="700">Draft</text>
      <text x="28" y="145" fill="#b8c0c2" font-size="18">Produces options</text>
      <text x="28" y="174" fill="#b8c0c2" font-size="18">or artifacts.</text>
      <path d="M28 212 H222" stroke="#ffffff" opacity=".08"/>
      <text x="28" y="254" fill="#747f82" font-size="15" font-weight="700">HUMAN</text>
      <text x="28" y="287" fill="#ffffff" font-size="18">Decides and acts.</text>
      <text x="28" y="345" fill="#747f82" font-size="15" font-weight="700">CONTROL</text>
      <text x="28" y="378" fill="#ffffff" font-size="18">Review output.</text>
    </g>
    <g transform="translate(397 235)">
      <rect width="250" height="410" rx="26" fill="#101719" stroke="#327d89" stroke-width="2"/>
      <text x="28" y="55" fill="#63b7c4" font-size="18" font-weight="700">D1</text>
      <text x="28" y="92" fill="#ffffff" font-size="28" font-weight="700">Recommend</text>
      <text x="28" y="145" fill="#b8c0c2" font-size="18">Evaluates options</text>
      <text x="28" y="174" fill="#b8c0c2" font-size="18">and proposes a call.</text>
      <path d="M28 212 H222" stroke="#ffffff" opacity=".08"/>
      <text x="28" y="254" fill="#63b7c4" font-size="15" font-weight="700">HUMAN</text>
      <text x="28" y="287" fill="#ffffff" font-size="18">Chooses.</text>
      <text x="28" y="345" fill="#63b7c4" font-size="15" font-weight="700">CONTROL</text>
      <text x="28" y="378" fill="#ffffff" font-size="18">Inspect reasoning.</text>
    </g>
    <g transform="translate(674 235)">
      <rect width="250" height="410" rx="26" fill="#0f191b" stroke="#06b6d4" stroke-width="2"/>
      <text x="28" y="55" fill="#5dd4ee" font-size="18" font-weight="700">D2</text>
      <text x="28" y="92" fill="#ffffff" font-size="28" font-weight="700">Prepare</text>
      <text x="28" y="145" fill="#b8c0c2" font-size="18">Completes work;</text>
      <text x="28" y="174" fill="#b8c0c2" font-size="18">waits before action.</text>
      <path d="M28 212 H222" stroke="#ffffff" opacity=".08"/>
      <text x="28" y="254" fill="#5dd4ee" font-size="15" font-weight="700">HUMAN</text>
      <text x="28" y="287" fill="#ffffff" font-size="18">Approves execution.</text>
      <text x="28" y="345" fill="#5dd4ee" font-size="15" font-weight="700">CONTROL</text>
      <text x="28" y="378" fill="#ffffff" font-size="18">Approval gate.</text>
    </g>
    <g transform="translate(951 235)">
      <rect width="250" height="410" rx="26" fill="#0e1a19" stroke="#16bd9c" stroke-width="2"/>
      <text x="28" y="55" fill="#5de0c1" font-size="18" font-weight="700">D3</text>
      <text x="28" y="92" fill="#ffffff" font-size="28" font-weight="700">Execute</text>
      <text x="28" y="145" fill="#b8c0c2" font-size="18">Acts inside explicit</text>
      <text x="28" y="174" fill="#b8c0c2" font-size="18">policy and limits.</text>
      <path d="M28 212 H222" stroke="#ffffff" opacity=".08"/>
      <text x="28" y="254" fill="#5de0c1" font-size="15" font-weight="700">HUMAN</text>
      <text x="28" y="287" fill="#ffffff" font-size="18">Supervises exceptions.</text>
      <text x="28" y="345" fill="#5de0c1" font-size="15" font-weight="700">CONTROL</text>
      <text x="28" y="378" fill="#ffffff" font-size="18">Policy + receipts.</text>
    </g>
    <g transform="translate(1228 235)">
      <rect width="250" height="410" rx="26" fill="#0d1c17" stroke="#10b981" stroke-width="2"/>
      <text x="28" y="55" fill="#6ee7b7" font-size="18" font-weight="700">D4</text>
      <text x="28" y="92" fill="#ffffff" font-size="28" font-weight="700">Orchestrate</text>
      <text x="28" y="145" fill="#b8c0c2" font-size="18">Delegates within</text>
      <text x="28" y="174" fill="#b8c0c2" font-size="18">budget and policy.</text>
      <path d="M28 212 H222" stroke="#ffffff" opacity=".08"/>
      <text x="28" y="254" fill="#6ee7b7" font-size="15" font-weight="700">HUMAN</text>
      <text x="28" y="287" fill="#ffffff" font-size="18">Owns the system.</text>
      <text x="28" y="345" fill="#6ee7b7" font-size="15" font-weight="700">CONTROL</text>
      <text x="28" y="378" fill="#ffffff" font-size="18">Audit + escalation.</text>
    </g>
  </g>
</svg>
