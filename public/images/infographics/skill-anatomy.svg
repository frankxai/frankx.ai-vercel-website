<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#050a14"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg2)"/>
  <text x="80" y="92" fill="#ffffff" font-size="44" font-weight="700">Anatomy of a Skill</text>
  <text x="80" y="134" fill="#9ca3af" font-size="24">A self-contained folder with one job — loaded by progressive disclosure</text>
  <line x1="80" y1="160" x2="1520" y2="160" stroke="#1f2a3a" stroke-width="2"/>

  <!-- folder root -->
  <rect x="80" y="210" width="640" height="610" rx="18" fill="#0e1626" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="112" y="262" fill="#5eead4" font-size="26" font-weight="700">skill-name/</text>

  <!-- SKILL.md card -->
  <rect x="112" y="290" width="576" height="210" rx="12" fill="#0f2018" stroke="#34d399" stroke-width="2"/>
  <text x="140" y="330" fill="#6ee7b7" font-size="24" font-weight="700">SKILL.md</text>
  <text x="140" y="362" fill="#94a3b8" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">---</text>
  <text x="140" y="388" fill="#e5e7eb" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">name: customer-discovery-synthesis</text>
  <text x="140" y="414" fill="#e5e7eb" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">description: what it does + when to</text>
  <text x="140" y="438" fill="#e5e7eb" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">load it, with trigger keywords</text>
  <text x="140" y="464" fill="#94a3b8" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">---</text>
  <text x="140" y="490" fill="#8593a8" font-size="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">## body — one workflow, &lt; 500 lines</text>

  <!-- subfolders -->
  <rect x="112" y="520" width="576" height="64" rx="10" fill="#101a2c" stroke="#3f5168"/>
  <text x="140" y="560" fill="#cbd5e1" font-size="20" font-weight="600">references/</text>
  <text x="360" y="560" fill="#7c8aa0" font-size="17">deep docs, loaded on demand</text>

  <rect x="112" y="596" width="576" height="64" rx="10" fill="#101a2c" stroke="#3f5168"/>
  <text x="140" y="636" fill="#cbd5e1" font-size="20" font-weight="600">scripts/</text>
  <text x="360" y="636" fill="#7c8aa0" font-size="17">deterministic checks the agent runs</text>

  <rect x="112" y="672" width="576" height="64" rx="10" fill="#101a2c" stroke="#3f5168"/>
  <text x="140" y="712" fill="#cbd5e1" font-size="20" font-weight="600">assets/</text>
  <text x="360" y="712" fill="#7c8aa0" font-size="17">templates used in the output</text>

  <rect x="112" y="748" width="576" height="56" rx="10" fill="#101a2c" stroke="#3f5168"/>
  <text x="140" y="784" fill="#cbd5e1" font-size="20" font-weight="600">evals/</text>
  <text x="360" y="784" fill="#7c8aa0" font-size="17">scenarios that prove it works</text>

  <!-- progressive disclosure column -->
  <text x="800" y="262" fill="#ffffff" font-size="28" font-weight="700">Progressive disclosure</text>
  <text x="800" y="296" fill="#9ca3af" font-size="19">A large library costs almost nothing until a skill triggers.</text>

  <rect x="800" y="330" width="720" height="130" rx="14" fill="#0e1626" stroke="#334155"/>
  <text x="828" y="372" fill="#34d399" font-size="22" font-weight="700">1 — Metadata</text>
  <text x="828" y="404" fill="#cbd5e1" font-size="19">name + description preloaded for every skill</text>
  <text x="828" y="432" fill="#7c8aa0" font-size="17">the only text used for routing — keep it tight</text>

  <rect x="800" y="480" width="720" height="130" rx="14" fill="#0e1626" stroke="#334155"/>
  <text x="828" y="522" fill="#2dd4bf" font-size="22" font-weight="700">2 — Body</text>
  <text x="828" y="554" fill="#cbd5e1" font-size="19">full SKILL.md read in only when it triggers</text>
  <text x="828" y="582" fill="#7c8aa0" font-size="17">one workflow, under ~500 lines</text>

  <rect x="800" y="630" width="720" height="130" rx="14" fill="#0e1626" stroke="#334155"/>
  <text x="828" y="672" fill="#94a3b8" font-size="22" font-weight="700">3 — Resources</text>
  <text x="828" y="704" fill="#cbd5e1" font-size="19">references / scripts / assets pulled only when needed</text>
  <text x="828" y="732" fill="#7c8aa0" font-size="17">one level deep, with a table of contents</text>
</svg>
