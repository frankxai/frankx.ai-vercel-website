<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#050a14"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg3)"/>
  <text x="80" y="92" fill="#ffffff" font-size="44" font-weight="700">The Five Layers of a Skill</text>
  <text x="80" y="134" fill="#9ca3af" font-size="24">How the Agent Skill Standard turns a workflow into operating knowledge</text>
  <line x1="80" y1="160" x2="1520" y2="160" stroke="#1f2a3a" stroke-width="2"/>

  <g>
    <rect x="160" y="210" width="1280" height="116" rx="14" fill="#0f2018" stroke="#34d399" stroke-width="2"/>
    <text x="200" y="258" fill="#6ee7b7" font-size="28" font-weight="700">1 · Intent</text>
    <text x="200" y="296" fill="#cbd5e1" font-size="20">Pick a workflow worth reusing — frequent, valuable, context-heavy, testable.</text>

    <rect x="160" y="342" width="1280" height="116" rx="14" fill="#0e1a24" stroke="#2dd4bf" stroke-width="2"/>
    <text x="200" y="390" fill="#5eead4" font-size="28" font-weight="700">2 · Knowledge</text>
    <text x="200" y="428" fill="#cbd5e1" font-size="20">Package style, templates, rules, examples via progressive disclosure.</text>

    <rect x="160" y="474" width="1280" height="116" rx="14" fill="#0e1626" stroke="#38bdf8" stroke-width="2"/>
    <text x="200" y="522" fill="#7dd3fc" font-size="28" font-weight="700">3 · Execution</text>
    <text x="200" y="560" fill="#cbd5e1" font-size="20">Explicit steps; deterministic checks in scripts, not guessed by the model.</text>

    <rect x="160" y="606" width="1280" height="116" rx="14" fill="#161226" stroke="#a78bfa" stroke-width="2"/>
    <text x="200" y="654" fill="#c4b5fd" font-size="28" font-weight="700">4 · Evaluation</text>
    <text x="200" y="692" fill="#cbd5e1" font-size="20">Prove it against 3+ scenarios: success, incomplete input, misuse boundary.</text>

    <rect x="160" y="738" width="1280" height="116" rx="14" fill="#231523" stroke="#f472b6" stroke-width="2"/>
    <text x="200" y="786" fill="#f9a8d4" font-size="28" font-weight="700">5 · Governance</text>
    <text x="200" y="824" fill="#cbd5e1" font-size="20">Owner, version, status, risk tier, allowed data, review date, rollback.</text>
  </g>
</svg>
