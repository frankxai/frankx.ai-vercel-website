<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#050a14"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg5)"/>
  <text x="80" y="92" fill="#ffffff" font-size="44" font-weight="700">Prompt · Skill · Agent · MCP</text>
  <text x="80" y="134" fill="#9ca3af" font-size="24">Four primitives that compose — not competitors. Each answers a different question.</text>
  <line x1="80" y1="160" x2="1520" y2="160" stroke="#1f2a3a" stroke-width="2"/>

  <!-- four columns -->
  <g>
    <rect x="80" y="210" width="340" height="560" rx="16" fill="#0e1626" stroke="#64748b" stroke-width="1.5"/>
    <text x="110" y="262" fill="#cbd5e1" font-size="28" font-weight="700">Prompt</text>
    <text x="110" y="300" fill="#7c8aa0" font-size="18">"Say this, once."</text>
    <line x1="110" y1="320" x2="390" y2="320" stroke="#1f2a3a"/>
    <text x="110" y="358" fill="#e5e7eb" font-size="18">Ad-hoc instruction</text>
    <text x="110" y="392" fill="#e5e7eb" font-size="18">Lives in a chat</text>
    <text x="110" y="426" fill="#e5e7eb" font-size="18">Not reusable</text>
    <text x="110" y="460" fill="#e5e7eb" font-size="18">No state, no checks</text>
    <text x="110" y="744" fill="#64748b" font-size="17">Question: what do I say?</text>

    <rect x="440" y="210" width="340" height="560" rx="16" fill="#0f2018" stroke="#34d399" stroke-width="2"/>
    <text x="470" y="262" fill="#6ee7b7" font-size="28" font-weight="700">Skill</text>
    <text x="470" y="300" fill="#7c8aa0" font-size="18">"Do this work, our way."</text>
    <line x1="470" y1="320" x2="750" y2="320" stroke="#163326"/>
    <text x="470" y="358" fill="#e5e7eb" font-size="18">Packaged workflow</text>
    <text x="470" y="392" fill="#e5e7eb" font-size="18">References + scripts</text>
    <text x="470" y="426" fill="#e5e7eb" font-size="18">Quality bar + evals</text>
    <text x="470" y="460" fill="#e5e7eb" font-size="18">Owned + versioned</text>
    <text x="470" y="744" fill="#6ee7b7" font-size="17">Question: how do we do it?</text>

    <rect x="800" y="210" width="340" height="560" rx="16" fill="#161226" stroke="#a78bfa" stroke-width="2"/>
    <text x="830" y="262" fill="#c4b5fd" font-size="28" font-weight="700">Agent</text>
    <text x="830" y="300" fill="#7c8aa0" font-size="18">"Pursue this goal."</text>
    <line x1="830" y1="320" x2="1110" y2="320" stroke="#241a3a"/>
    <text x="830" y="358" fill="#e5e7eb" font-size="18">Runs a loop</text>
    <text x="830" y="392" fill="#e5e7eb" font-size="18">Plans + decides</text>
    <text x="830" y="426" fill="#e5e7eb" font-size="18">Calls skills + tools</text>
    <text x="830" y="460" fill="#e5e7eb" font-size="18">Holds context</text>
    <text x="830" y="744" fill="#c4b5fd" font-size="17">Question: what's the goal?</text>

    <rect x="1160" y="210" width="340" height="560" rx="16" fill="#0e1a24" stroke="#2dd4bf" stroke-width="2"/>
    <text x="1190" y="262" fill="#5eead4" font-size="28" font-weight="700">MCP</text>
    <text x="1190" y="300" fill="#7c8aa0" font-size="18">"Reach this system."</text>
    <line x1="1190" y1="320" x2="1470" y2="320" stroke="#10312e"/>
    <text x="1190" y="358" fill="#e5e7eb" font-size="18">Tool + data access</text>
    <text x="1190" y="392" fill="#e5e7eb" font-size="18">Resources + tools</text>
    <text x="1190" y="426" fill="#e5e7eb" font-size="18">A wire protocol</text>
    <text x="1190" y="460" fill="#e5e7eb" font-size="18">Server-side capability</text>
    <text x="1190" y="744" fill="#5eead4" font-size="17">Question: what can it touch?</text>
  </g>

  <text x="80" y="832" fill="#64748b" font-size="20">The new operating layer = model capability + MCP tool access + Skill operating knowledge + Agent autonomy.</text>
</svg>
