<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#050a14"/>
    </linearGradient>
    <linearGradient id="rise" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#334155"/>
      <stop offset="0.5" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="80" y="92" fill="#ffffff" font-size="44" font-weight="700">The Skill Maturity Model</text>
  <text x="80" y="134" fill="#9ca3af" font-size="24">Agent Skill Standard v1.0 — six levels from ad-hoc prompt to composed, attested capability</text>
  <line x1="80" y1="160" x2="1520" y2="160" stroke="#1f2a3a" stroke-width="2"/>

  <!-- ascending diagonal accent -->
  <polyline points="120,760 360,690 600,610 840,520 1080,420 1320,300" fill="none" stroke="url(#rise)" stroke-width="4" stroke-dasharray="2 10" stroke-linecap="round" opacity="0.6"/>

  <!-- steps -->
  <g>
    <!-- L0 -->
    <rect x="120" y="700" width="220" height="120" rx="14" fill="#0e1626" stroke="#334155" stroke-width="1.5"/>
    <text x="140" y="744" fill="#64748b" font-size="30" font-weight="700">L0</text>
    <text x="140" y="778" fill="#e5e7eb" font-size="24" font-weight="600">Prompt</text>
    <text x="140" y="804" fill="#8593a8" font-size="16">Ad-hoc, not reusable</text>
    <!-- L1 -->
    <rect x="360" y="630" width="220" height="120" rx="14" fill="#0e1626" stroke="#3f5168" stroke-width="1.5"/>
    <text x="380" y="674" fill="#7c8aa0" font-size="30" font-weight="700">L1</text>
    <text x="380" y="708" fill="#e5e7eb" font-size="24" font-weight="600">Documented</text>
    <text x="380" y="734" fill="#8593a8" font-size="16">SKILL.md + triggers</text>
    <!-- L2 -->
    <rect x="600" y="550" width="220" height="120" rx="14" fill="#0e1a24" stroke="#2dd4bf" stroke-width="1.5"/>
    <text x="620" y="594" fill="#5eead4" font-size="30" font-weight="700">L2</text>
    <text x="620" y="628" fill="#e5e7eb" font-size="24" font-weight="600">Referenced</text>
    <text x="620" y="654" fill="#8593a8" font-size="16">references / scripts / assets</text>
    <!-- L3 -->
    <rect x="840" y="460" width="220" height="120" rx="14" fill="#0e1a24" stroke="#2dd4bf" stroke-width="2"/>
    <text x="860" y="504" fill="#5eead4" font-size="30" font-weight="700">L3</text>
    <text x="860" y="538" fill="#e5e7eb" font-size="24" font-weight="600">Evaluated</text>
    <text x="860" y="564" fill="#8593a8" font-size="16">3+ eval scenarios</text>
    <!-- L4 -->
    <rect x="1080" y="360" width="220" height="120" rx="14" fill="#0f2018" stroke="#34d399" stroke-width="2"/>
    <text x="1100" y="404" fill="#6ee7b7" font-size="30" font-weight="700">L4</text>
    <text x="1100" y="438" fill="#e5e7eb" font-size="24" font-weight="600">Governed</text>
    <text x="1100" y="464" fill="#8593a8" font-size="16">owner · version · risk tier</text>
    <!-- L5 -->
    <rect x="1320" y="240" width="220" height="120" rx="14" fill="#0f2018" stroke="#34d399" stroke-width="3"/>
    <text x="1340" y="284" fill="#6ee7b7" font-size="30" font-weight="700">L5</text>
    <text x="1340" y="318" fill="#e5e7eb" font-size="24" font-weight="600">Composed</text>
    <text x="1340" y="344" fill="#8593a8" font-size="16">attested + sovereign</text>
  </g>

  <text x="120" y="868" fill="#64748b" font-size="18">Activity ──────────────────────────────────────────────▶ Capability</text>
</svg>
